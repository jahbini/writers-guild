trigrams:

  - id: 1
    name: "☰ Heaven"
    chinese: "乾"
    pinyin: "Qián"
    energy_core: "Ethos"
    polarity: "Yang / Active"
    element: "Sky / Creative"
    qualities: ["strength", "initiative", "authority", "leadership"]
    energetic_profile:
      ethos: 1.0
      logos: 0.6
      pathos: 0.2
      anima_m: 1.0
      anima_f: 0.2
    vital_axis:
      balance: +0.8          # strong outward thrust
    narrative_function: "Pure creativity and resolve; initiates new cycles."
    moral_axis: "Vision → Responsibility"
    tone: "Rising, luminous, commanding"
    story_tags: ["origin", "leadership", "cosmic order"]

