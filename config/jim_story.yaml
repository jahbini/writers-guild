run:
  output_dir: out
  data_dir: data
  params_dir: params

artifacts:
  story_library: { target: out/story_library.json }
  story_recipe:  { target: out/story_recipe.json }
  story_parts:   { target: out/story_parts.json }
  story:         { target: out/story.json }

load_library:
  run: scripts/jim/load_library.coffee
  depends_on: []
  needs: []
  makes: [story_library]
  library_file: data/jim_story_library.yaml

select_story_recipe:
  run: scripts/jim/select_story_recipe.coffee
  depends_on: [load_library]
  needs: [story_library]
  makes: [story_recipe]
  story_id: jim_0001

resolve_story_parts:
  run: scripts/jim/resolve_story_parts.coffee
  depends_on: [select_story_recipe]
  needs: [story_library, story_recipe]
  makes: [story_parts]

assemble_story:
  run: scripts/jim/assemble_story.coffee
  depends_on: [resolve_story_parts]
  needs: [story_parts]
  makes: [story]
