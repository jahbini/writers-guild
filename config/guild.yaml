# AI Writer's Guild — demo recipe
run:
  data_dir: "data"
  output_dir: "out"

artifacts:
  chapter_text:
    source: "examples/sample_chapter.txt"
  ontology:
    source: "ontologies/four_forces_tarot_master.json"
  characters:
    value: ["Eleanor", "Chidi", "Tahani"]
  arcs:
    target: "out/arcs.json"
  scene_text:
    target: "out/scene.txt"
  analysis:
    target: "out/plot_character_analysis.json"

guild_analyze:
  run: "guild/analyze_chapter.coffee"
  depends_on: []
  needs: ["chapter_text", "ontology", "characters"]
  makes: ["arcs"]
  desc: "Analyze chapter and score characters"

guild_generate:
  run: "guild/generate_chapter.coffee"
  depends_on: ["guild_analyze"]
  needs: ["arcs", "ontology"]
  makes: ["scene_text"]
  desc: "Generate a new scene from analyzed profiles"
  tarot: "Temperance XIV"
  interaction: "Eleanor confronts Chidi about a painful truth"

guild_extract_plot_character:
  run: "guild/extract_plot_character.coffee"
  depends_on: []
  needs: ["chapter_text", "characters"]
  makes: ["analysis"]
  desc: "Extract plot and character structures from story files"
  schema_ref: "plot_character.yaml"
  selftest: false
  story_id: "story_sample_chapter"
  story_title: "Sample Chapter"
